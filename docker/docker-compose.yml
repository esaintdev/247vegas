version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: casino-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casino_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casino_pass}
      POSTGRES_DB: ${POSTGRES_DB:-casino_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casino_user} -d ${POSTGRES_DB:-casino_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis Cache ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: casino-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: casino-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DEBUG: "true"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  redis_data:
